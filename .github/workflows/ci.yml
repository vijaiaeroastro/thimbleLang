name: Thimble CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run build and tests on Unix
        if: runner.os != 'Windows'
        run: python build.py

      - name: Run build and tests on Windows
        if: runner.os == 'Windows'
        shell: cmd
        env:
          CXX: cl
        run: |
          for /f "usebackq tokens=*" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do call "%%i\Common7\Tools\VsDevCmd.bat" -arch=x64
          python build.py

  sanitizers:
    name: sanitizers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Run address and undefined behaviour sanitizers
        run: python build.py --sanitize --warnings-as-errors

  release-validation:
    name: package and CMake consumer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Validate installed and archived distributions
        run: python tools/validate_release.py
      - name: Parse website HTML
        run: python -c "from html.parser import HTMLParser; from pathlib import Path; p=HTMLParser(); [p.feed(f.read_text()) for f in Path('site').glob('*.html')]"
